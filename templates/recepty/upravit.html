{% extends 'recepty/base.html' %}

{% block title %}Upravit recept{% endblock %}

{% block content %}
    <h1>✏️ Upravit recept</h1>
    <div class="form-container">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Uložit změny</button>
            <a href="{% url 'detail' recept.pk %}" class="btn btn-secondary">Zrušit</a>
        </form>
    </div>
{% endblock %}
